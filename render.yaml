services:
  - type: web
    name: cross-asset-research-dashboard
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.lock
    startCommand: uvicorn app.status_api:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    maxShutdownDelaySeconds: 300
    envVars:
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ALPACA_FEED
        value: iex
      - key: SUPABASE_STORAGE_UPLOAD
        value: "true"
      - key: SUPABASE_STORAGE_BUCKET
        value: cross-asset-research-exports
      - key: LOG_LEVEL
        value: INFO
